<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Entrenamiento personalizado con IA y análisis de postura">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="6YM.C0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme -->
  <meta name="theme-color" content="#0A0A0A">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>6YM.C0</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #0A0A0A;
      height: 100%;
      width: 100%;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0A0A0A;
    }
    #loading-title {
      color: #00FF88;
      font-family: monospace;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 8px;
      opacity: 0;
      animation: fadeIn 0.7s ease-in 0.3s forwards;
    }
    #loading-bar-wrap {
      margin-top: 60px;
      width: 200px;
      height: 2px;
      background: #1A1A1A;
      opacity: 0;
      animation: fadeIn 0.7s ease-in 0.3s forwards;
    }
    #loading-bar {
      height: 2px;
      background: #00FF88;
      width: 0%;
      animation: progress 2.5s ease-in-out 0.5s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes progress {
      0%   { width: 0%; }
      60%  { width: 70%; }
      100% { width: 100%; }
    }
    flt-glass-pane { background: #0A0A0A !important; }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-title">6YM.C0</div>
    <div id="loading-bar-wrap">
      <div id="loading-bar"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
